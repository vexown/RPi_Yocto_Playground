# Kernel config fragment: expose the running kernel's configuration at
# /proc/config.gz. Merged onto the Pi kernel's config at do_configure by
# the .bbappend next to this file.
#
# (Originally meant to be captured with `bitbake -c diffconfig`, but the
# bbappend referencing this file landed first and broke parsing — a
# file:// in SRC_URI must exist at PARSE time. Written by hand instead;
# same two lines diffconfig would have produced. See notes/09.)
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y
