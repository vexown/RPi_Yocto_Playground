# bblayers.conf — which layers BitBake sees.
# Tracked in the repo; copied into the build dir by scripts/setup-yocto.sh.

POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

YOCTO_ROOT = "/media/blankmcu/EmbeddedLinux/yocto"

BBLAYERS ?= " \
  ${YOCTO_ROOT}/poky/meta \
  ${YOCTO_ROOT}/poky/meta-poky \
  ${YOCTO_ROOT}/poky/meta-yocto-bsp \
  ${YOCTO_ROOT}/meta-raspberrypi \
  "
