# local.conf — build configuration for the RPi Yocto Playground
# Tracked in the repo; copied into the build dir by scripts/setup-yocto.sh.
# The generated default local.conf is full of commented documentation —
# read poky/meta-poky/conf/templates/default/local.conf.sample for that.

MACHINE = "raspberrypi5"

# Shared caches on the big disk: downloads survive `rm -rf build`,
# sstate makes rebuilds take minutes instead of hours.
DL_DIR = "/media/blankmcu/EmbeddedLinux/yocto/downloads"
SSTATE_DIR = "/media/blankmcu/EmbeddedLinux/yocto/sstate-cache"

DISTRO = "poky"
PACKAGE_CLASSES = "package_rpm"

# --- Image customization ------------------------------------------------
# Two different mechanisms, deliberately both used here to learn them:
#
# 1) IMAGE_FEATURES: named *bundles* of functionality defined by Yocto.
#    - debug-tweaks: passwordless root login (dev only, never production!)
#    - ssh-server-dropbear: adds Dropbear, a small (~200 KB) SSH server
#      built for embedded use (vs. full OpenSSH). Yocto patches it to
#      honor debug-tweaks' empty-password root login.
EXTRA_IMAGE_FEATURES ?= "debug-tweaks ssh-server-dropbear"
#
# 2) IMAGE_INSTALL: add *individual packages* to the image.
#    ":append" (with a leading space!) adds to whatever the image recipe
#    already set — using plain "=" here would wipe out the base package
#    list and break the build. This is the #1 beginner footgun.
#    os-release: the /etc/os-release identity file we found missing.
IMAGE_INSTALL:append = " os-release"

# --- Raspberry Pi board settings ------------------------------------------
# Enable the UART (GPIO serial console). Side effect discovered in session
# 1c: meta-raspberrypi's rpi-cmdline.bb then makes serial0 the ONLY kernel
# console, so boot logs never reach the HDMI screen.
ENABLE_UART = "1"

# Fix: append tty1 to the kernel command line. CMDLINE is a variable of
# the rpi-cmdline recipe (meta-raspberrypi/recipes-bsp/bootfiles/).
# The LAST console= wins /dev/console, so logs now show on HDMI *and*
# still go out the UART.
CMDLINE:append = " console=tty1"

# Free disk space monitoring — halt cleanly instead of corrupting the build.
# (Older docs/books say "ABORT"; it was renamed to "HALT" in Yocto 4.0.)
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K"

CONF_VERSION = "2"
